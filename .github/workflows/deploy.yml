name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Remove server-only code for static export
        run: |
          rm -rf src/app/api
          rm -rf src/app/admin
          rm -f src/lib/db.ts

      - name: Build
        env:
          STATIC_EXPORT: "true"
          NEXT_PUBLIC_BASE_PATH: "/mutuguard"
          NEXT_PUBLIC_FORMSPREE_ID: ${{ vars.FORMSPREE_ID || 'xdawwzeb' }}
        run: npx next build

      - name: Add .nojekyll for GitHub Pages
        run: touch out/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
