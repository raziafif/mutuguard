name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Remove server-only code for static export
        run: |
          rm -rf src/app/api
          rm -rf src/app/admin
          rm -f src/lib/db.ts

      - name: Build
        env:
          STATIC_EXPORT: "true"
          NEXT_PUBLIC_BASE_PATH: "/mutuguard"
          # Demo form POSTs to Vercel API. Set vars.VERCEL_URL if your deployment uses a different URL.
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.VERCEL_URL || 'https://mutuguard.vercel.app' }}
        run: npx next build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
